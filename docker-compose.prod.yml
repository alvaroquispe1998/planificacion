services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uai_planning
    ports: []

  backend:
    env_file:
      - ./backend/.env.prod
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      PORT: 3000
      DB_SYNCHRONIZE: 'false'
      SYNC_TLS_ALLOW_INSECURE: 'false'
    ports: []

  frontend:
    environment:
      UAI_API_BASE_URL: /api
    ports:
      - '${FRONTEND_HOST_PORT:-8080}:80'
