services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      uai_network:
        aliases:
          - mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD']
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      uai_network:
        aliases:
          - backend

  # seed:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: uai-seed
  #   environment:
  #     DB_HOST: mysql
  #     DB_PORT: 3306
  #     DB_USER: root
  #     DB_PASSWORD: root
  #     DB_NAME: uai_planning
  #   depends_on:
  #     backend:
  #       condition: service_started
  #   command: ['node', 'dist/seed/seed.js']
  #   restart: 'no'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      uai_network:
        aliases:
          - frontend

volumes:
  mysql_data:

networks:
  uai_network:
    name: planificacion_uai_network
