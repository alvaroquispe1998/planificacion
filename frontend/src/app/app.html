<ng-container *ngIf="ready$ | async">
  <main class="layout" *ngIf="session$ | async as session; else loginLayout">
    <header class="shell-header">
      <div class="brand-block">
        <p class="brand-tag">UAI Platform</p>
        <h1>Academic Scheduling Console</h1>
      </div>

      <div class="session-block">
        <p class="session-name">{{ session.user.display_name }}</p>
        <p class="session-meta">{{ getRoleNames(session) }}</p>
        <button type="button" class="session-logout" (click)="logout()">Salir</button>
      </div>

      <nav>
        <a
          *ngFor="let item of navItems"
          routerLink="{{ item.path }}"
          routerLinkActive="active"
          [class.hidden-link]="!canAccessNav(item)"
          [attr.aria-hidden]="!canAccessNav(item) ? 'true' : null"
          [hidden]="!canAccessNav(item)"
        >
          {{ item.label }}
        </a>
      </nav>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</ng-container>

<ng-template #loginLayout>
  <router-outlet></router-outlet>
</ng-template>
