<section class="login-shell">
  <article class="login-card">
    <!-- <p class="eyebrow">UAI Platform</p> -->
    <h1>Planificación UAI</h1>
    <!-- <p class="intro">
      Consola para organizar planes, secciones, cruces y accesos academicos.
    </p> -->

    <label>
      Usuario
      <input [(ngModel)]="username" type="text" autocomplete="username" placeholder="Usuario" />
    </label>

    <label>
      Password
      <input
        [(ngModel)]="password"
        type="password"
        autocomplete="current-password"
        placeholder="********"
        (keyup.enter)="submit()"
      />
    </label>

    <button type="button" (click)="submit()" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Ingresando...' : 'Iniciar sesion' }}
    </button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </article>
</section>
