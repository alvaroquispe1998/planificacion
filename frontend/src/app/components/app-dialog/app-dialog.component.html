<ng-container *ngIf="dialog$ | async as dialog">
  <div class="dialog-backdrop">
    <section class="dialog-card" [ngClass]="'tone-' + dialog.tone" (click)="$event.stopPropagation()">
      <div class="dialog-head">
        <p class="dialog-kicker">{{ dialog.kind === 'confirm' ? 'Confirmacion' : 'Mensaje del sistema' }}</p>
        <h3>{{ dialog.title }}</h3>
      </div>

      <p class="dialog-message">{{ dialog.message }}</p>

      <label *ngIf="dialog.kind === 'prompt'" class="dialog-field">
        <span>{{ dialog.inputLabel || 'Detalle' }}</span>
        <textarea
          [(ngModel)]="promptValue"
          [attr.maxLength]="dialog.maxLength || null"
          [placeholder]="dialog.inputPlaceholder || ''"
          rows="4"></textarea>
      </label>

      <div class="dialog-actions">
        <button
          *ngIf="dialog.kind === 'confirm' || dialog.kind === 'prompt'"
          type="button"
          class="btn btn-secondary"
          (click)="cancel()">
          {{ dialog.cancelLabel }}
        </button>
        <button
          type="button"
          class="btn"
          [ngClass]="dialog.tone === 'danger' ? 'btn-danger' : 'btn-primary'"
          (click)="accept(dialog.kind)">
          {{ dialog.confirmLabel }}
        </button>
      </div>
    </section>
  </div>
</ng-container>
